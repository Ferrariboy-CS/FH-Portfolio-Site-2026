<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Use favicon.png as favicon -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Portfolio website of Festus Helao Shatipamba"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap">
    </noscript>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
    <script defer src="https://unpkg.com/framer-motion@11.0.24/dist/framer-motion.umd.js" crossorigin="anonymous"></script>
    <script>
      (function () {
        var storageKey = "theme-preference";
        var darkClass = "dark";
        var lightColor = "#f5f6ff";
        var darkColor = "#090b1a";
        try {
          var storedTheme = localStorage.getItem(storageKey);
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = storedTheme || (prefersDark ? "dark" : "light");
          document.documentElement.classList.toggle(darkClass, theme === "dark");
          document.documentElement.setAttribute("data-theme", theme);
          var metaThemeColor = document.querySelector('meta[name="theme-color"]');
          if (metaThemeColor) {
            metaThemeColor.setAttribute('content', theme === "dark" ? darkColor : lightColor);
          }
        } catch (error) {
          var fallbackDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle(darkClass, fallbackDark);
          var fallbackTheme = fallbackDark ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", fallbackTheme);
          var fallbackMetaThemeColor = document.querySelector('meta[name="theme-color"]');
          if (fallbackMetaThemeColor) {
            fallbackMetaThemeColor.setAttribute('content', fallbackDark ? darkColor : lightColor);
          }
        }
      })();
    </script>
    <title>Portfolio - Festus Helao Shatipamba</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
