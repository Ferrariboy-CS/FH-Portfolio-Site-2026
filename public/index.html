<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Use favicon.png as favicon -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Portfolio website of Festus Helao Shatipamba"
    />
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
    <script defer src="https://unpkg.com/framer-motion@11.0.24/dist/framer-motion.umd.js" crossorigin="anonymous"></script>
    <script>
      (function () {
        var storageKey = "theme-preference";
        try {
          var storedTheme = localStorage.getItem(storageKey);
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = storedTheme || (prefersDark ? "dark" : "light");
          document.documentElement.classList.toggle("dark-theme", theme === "dark");
          document.documentElement.dataset.theme = theme;
          var metaThemeColor = document.querySelector('meta[name="theme-color"]');
          if (metaThemeColor) {
            metaThemeColor.setAttribute('content', theme === "dark" ? '#0a0a0f' : '#ffffff');
          }
        } catch (error) {
          var fallbackDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark-theme", fallbackDark);
          var fallbackTheme = fallbackDark ? "dark" : "light";
          document.documentElement.dataset.theme = fallbackTheme;
          var fallbackMetaThemeColor = document.querySelector('meta[name="theme-color"]');
          if (fallbackMetaThemeColor) {
            fallbackMetaThemeColor.setAttribute('content', fallbackDark ? '#0a0a0f' : '#ffffff');
          }
        }
      })();
    </script>
    <title>Portfolio - Festus Helao Shatipamba</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
